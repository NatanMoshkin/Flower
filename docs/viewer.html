<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Flower — Doc Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<style>
  :root {
    --bg: #1e1e1e; --bg2: #252526; --bg3: #2d2d30; --border: #3e3e42;
    --text: #e0e0e0; --muted: #a0a0a0;
    --accent: #4fc3f7; --accent2: #81c784; --warn: #ffb74d; --danger: #e57373;
    --skill: #ffb74d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.65 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  header.doc-head {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 18px 30px; position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  header.doc-head .title { font-size: 18px; color: var(--accent); font-weight: 600; margin: 0; flex: 1 1 300px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header.doc-head .path { font-family: 'Consolas', 'Cascadia Code', monospace; font-size: 11px; color: var(--muted); word-break: break-all; }
  header.doc-head .links { display: flex; gap: 12px; align-items: center; font-size: 13px; }
  header.doc-head .links a { color: var(--accent); text-decoration: none; }
  header.doc-head .links a:hover { text-decoration: underline; }
  header.doc-head .links .sep { color: var(--border); }

  .layout { display: grid; grid-template-columns: 1fr 240px; gap: 40px; padding: 24px 30px; max-width: 1300px; margin: 0 auto; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } aside.toc { display: none; } }

  main.content { min-width: 0; }
  aside.toc {
    position: sticky; top: 78px; align-self: start;
    max-height: calc(100vh - 100px); overflow-y: auto;
    font-size: 12px; color: var(--muted);
    border-left: 1px solid var(--border); padding-left: 16px;
  }
  aside.toc h3 { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 0; }
  aside.toc a { display: block; color: var(--muted); text-decoration: none; padding: 3px 0; border-left: 2px solid transparent; padding-left: 8px; margin-left: -8px; }
  aside.toc a:hover { color: var(--accent); border-left-color: var(--accent); }
  aside.toc a.active { color: var(--accent); border-left-color: var(--accent); }

  /* Frontmatter card (rendered when a .md starts with YAML --- ... ---) */
  .skill-meta {
    background: rgba(255, 183, 77, 0.06);
    border: 1px solid rgba(255, 183, 77, 0.3);
    border-left: 4px solid var(--skill);
    border-radius: 8px;
    padding: 12px 16px 12px 16px;
    margin: 0 0 20px 0;
    font-size: 13px;
  }
  .skill-meta dt { color: var(--skill); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; float: left; width: 90px; padding-top: 2px; }
  .skill-meta dd { margin: 0 0 6px 100px; color: var(--text); }
  .skill-meta dd:last-child { margin-bottom: 0; }
  .skill-meta code { background: var(--bg3); padding: 1px 6px; border-radius: 3px; font-size: 12px; }

  /* Rendered markdown */
  main.content h1 { color: var(--accent); font-size: 26px; margin: 0 0 12px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  main.content h2 { color: var(--accent); font-size: 20px; margin: 32px 0 12px 0; padding-bottom: 4px; border-bottom: 1px solid var(--border); scroll-margin-top: 80px; }
  main.content h3 { color: var(--accent2); font-size: 16px; margin: 24px 0 10px 0; scroll-margin-top: 80px; }
  main.content h4 { color: var(--accent2); font-size: 14px; margin: 20px 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  main.content h5, main.content h6 { color: var(--muted); font-size: 13px; margin: 16px 0 6px 0; }
  main.content p { margin: 10px 0; }
  main.content ul, main.content ol { margin: 10px 0; padding-left: 28px; }
  main.content li { margin: 4px 0; }
  main.content li > p { margin: 4px 0; }
  main.content strong { color: #fff; font-weight: 600; }
  main.content em { color: var(--warn); }
  main.content a { color: var(--accent); text-decoration: none; }
  main.content a:hover { text-decoration: underline; }

  main.content code {
    background: var(--bg3); padding: 1px 6px; border-radius: 3px;
    font-family: 'Consolas', 'Cascadia Code', monospace; font-size: 0.9em;
    color: var(--accent2);
  }
  main.content pre {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; overflow-x: auto; margin: 12px 0;
  }
  main.content pre code {
    background: transparent; padding: 0; border-radius: 0;
    font-size: 13px; color: var(--text);
  }

  main.content blockquote {
    margin: 12px 0; padding: 10px 16px;
    background: var(--bg2); border-left: 4px solid var(--warn); border-radius: 4px;
    color: var(--text);
  }
  main.content blockquote p:first-child { margin-top: 0; }
  main.content blockquote p:last-child { margin-bottom: 0; }

  main.content table {
    width: 100%; border-collapse: collapse;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden; margin: 14px 0; font-size: 13px;
  }
  main.content thead { background: var(--bg3); }
  main.content th, main.content td {
    padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  main.content th { color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  main.content tbody tr:last-child td { border-bottom: 0; }
  main.content tbody tr:hover { background: rgba(79, 195, 247, 0.04); }
  main.content td code { color: var(--accent); }

  main.content hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Error state */
  .error-card {
    background: rgba(229, 115, 115, 0.06);
    border: 1px solid rgba(229, 115, 115, 0.4);
    border-left: 4px solid var(--danger);
    border-radius: 8px;
    padding: 20px 24px; margin: 20px 0;
  }
  .error-card h2 { color: var(--danger); margin: 0 0 8px 0; font-size: 18px; border-bottom: 0; padding-bottom: 0; }
  .error-card p { margin: 8px 0; font-size: 13px; }
  .error-card pre { background: var(--bg); padding: 10px 14px; border-radius: 4px; font-size: 12px; margin: 10px 0; overflow-x: auto; }
  .error-card ul { padding-left: 22px; font-size: 13px; }

  /* Loading indicator */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .loading::before { content: '\21bb'; display: inline-block; animation: spin 1s linear infinite; font-size: 20px; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Fallback raw-MD viewer */
  main.content pre.raw-fallback {
    white-space: pre-wrap; word-wrap: break-word;
    color: var(--muted); font-size: 12px;
  }
</style>
</head>
<body>

<header class="doc-head">
  <div style="flex: 1 1 300px; min-width: 0;">
    <div class="title" id="doc-title">Loading&hellip;</div>
    <div class="path" id="doc-path"></div>
  </div>
  <div class="links">
    <a href="index.html">&larr; index</a>
    <span class="sep">|</span>
    <a id="raw-link" href="#" target="_blank">view raw .md</a>
  </div>
</header>

<div class="layout">
  <main class="content" id="content">
    <div class="loading">Loading document&hellip;</div>
  </main>
  <aside class="toc" id="toc" style="display:none">
    <h3>On this page</h3>
    <nav id="toc-nav"></nav>
  </aside>
</div>

<!-- marked.js for MD parsing; highlight.js browser bundle for code fences.
     cdnjs ships browser-ready bundles with common languages pre-registered
     (javascript, python, bash, yaml, json, xml, markdown, powershell, etc.). -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/powershell.min.js"></script>

<script>
(function () {
  const REPO = 'Flower';
  const REPO_ROOT_HINT = 'C:\\Users\\Natan.Moshkin\\source\\repos\\Flower';

  // ---- URL param ----
  const params = new URLSearchParams(location.search);
  const docPath = params.get('doc');
  if (!docPath) {
    showError('No document specified.',
      'Add a <code>?doc=</code> query parameter, e.g. <code>viewer.html?doc=../docs/timestamping.md</code>. Or go back to <a href="index.html">the index</a>.');
    return;
  }
  if (/^(https?:|\/\/|file:)/i.test(docPath)) {
    showError('External URLs are not allowed.', 'Only same-repo relative paths (e.g. <code>../docs/timestamping.md</code>) can be rendered by this viewer.');
    return;
  }

  document.getElementById('raw-link').href = docPath;
  document.getElementById('doc-path').textContent = docPath;

  fetch(docPath, { cache: 'no-cache' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + docPath);
      return r.text();
    })
    .then(render)
    .catch(err => showFetchError(err));

  function render(raw) {
    if (typeof marked === 'undefined') {
      showError('Markdown renderer unavailable.',
        'The <code>marked.js</code> library did not load from CDN. Showing raw markdown below.',
        raw);
      return;
    }

    const { front, body } = splitFrontmatter(raw);

    marked.use({
      breaks: false,
      gfm: true,
      headerIds: true,
      headerPrefix: 'h-',
      mangle: false,
    });

    const renderer = new marked.Renderer();
    const baseHref = docPath.substring(0, docPath.lastIndexOf('/') + 1);

    renderer.code = function (code, infostring) {
      const lang = (infostring || '').split(' ')[0].toLowerCase();
      let out;
      if (lang && typeof hljs !== 'undefined' && hljs.getLanguage(lang)) {
        try { out = hljs.highlight(code, { language: lang, ignoreIllegals: true }).value; }
        catch (e) { out = escapeHtml(code); }
      } else if (typeof hljs !== 'undefined') {
        try { out = hljs.highlightAuto(code).value; }
        catch (e) { out = escapeHtml(code); }
      } else {
        out = escapeHtml(code);
      }
      return '<pre><code class="hljs language-' + escapeHtml(lang) + '">' + out + '</code></pre>';
    };

    renderer.link = function (href, title, text) {
      const rewritten = rewriteLink(href, baseHref);
      const isExternal = /^https?:\/\//i.test(rewritten.href);
      const attrs = [
        'href="' + escapeHtml(rewritten.href) + '"',
        title ? 'title="' + escapeHtml(title) + '"' : null,
        isExternal ? 'target="_blank" rel="noopener"' : null,
      ].filter(Boolean).join(' ');
      return '<a ' + attrs + '>' + text + '</a>';
    };

    const bodyHtml = marked.parse(body, { renderer });

    const h1Match = body.match(/^#\s+(.+?)\s*$/m);
    const filename = docPath.split('/').pop();
    const title = h1Match ? h1Match[1] : filename;
    document.title = title + ' — ' + REPO;
    document.getElementById('doc-title').textContent = title;

    const container = document.getElementById('content');
    container.innerHTML = '';
    if (front) container.appendChild(renderFrontmatter(front));
    const bodyDiv = document.createElement('div');
    bodyDiv.innerHTML = bodyHtml;
    container.appendChild(bodyDiv);

    buildToc(container);

    if (location.hash) {
      const t = document.getElementById(location.hash.slice(1));
      if (t) t.scrollIntoView();
    }
  }

  function splitFrontmatter(raw) {
    const m = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
    if (!m) return { front: null, body: raw };
    return { front: m[1], body: m[2] };
  }

  function renderFrontmatter(front) {
    const out = document.createElement('div');
    out.className = 'skill-meta';
    const dl = document.createElement('dl');
    dl.style.margin = '0';
    const lines = front.split(/\r?\n/);
    let currentKey = null;
    let currentVal = '';
    const rows = [];
    lines.forEach(line => {
      if (/^\s{2,}/.test(line) && currentKey) {
        currentVal += ' ' + line.trim();
      } else {
        if (currentKey) rows.push({ key: currentKey, val: currentVal.trim() });
        const m = line.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
        if (m) { currentKey = m[1]; currentVal = m[2]; }
        else { currentKey = null; currentVal = ''; }
      }
    });
    if (currentKey) rows.push({ key: currentKey, val: currentVal.trim() });

    rows.forEach(({ key, val }) => {
      if (!val) return;
      const dt = document.createElement('dt');
      dt.textContent = key;
      const dd = document.createElement('dd');
      dd.textContent = val;
      dl.appendChild(dt);
      dl.appendChild(dd);
    });
    out.appendChild(dl);
    return out;
  }

  function rewriteLink(href, baseHref) {
    if (/^(#|https?:\/\/|mailto:)/i.test(href)) return { href };
    if (/^\/\//.test(href)) return { href };
    const resolved = resolvePath(baseHref, href);
    const hashIdx = resolved.indexOf('#');
    const pathPart = hashIdx >= 0 ? resolved.slice(0, hashIdx) : resolved;
    const anchor = hashIdx >= 0 ? resolved.slice(hashIdx) : '';
    if (/\.md$/i.test(pathPart)) {
      return { href: 'viewer.html?doc=' + encodeURIComponent(pathPart) + anchor };
    }
    return { href: resolved };
  }

  function resolvePath(base, rel) {
    if (rel.startsWith('/')) return rel;
    const parts = (base + rel).split('/');
    const out = [];
    parts.forEach(p => {
      if (p === '' && out.length) return;
      if (p === '.') return;
      if (p === '..') { if (out.length && out[out.length - 1] !== '..') out.pop(); else out.push('..'); }
      else out.push(p);
    });
    return out.join('/');
  }

  function buildToc(container) {
    const h2s = container.querySelectorAll('h2');
    if (h2s.length < 2) return;
    const toc = document.getElementById('toc');
    const nav = document.getElementById('toc-nav');
    nav.innerHTML = '';
    h2s.forEach((h, i) => {
      if (!h.id) h.id = 'h-' + i;
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      nav.appendChild(a);
    });
    toc.style.display = '';
    const links = Array.from(nav.querySelectorAll('a'));
    const targets = Array.from(h2s);
    function updateActive() {
      let idx = 0;
      const scrollY = window.scrollY + 100;
      for (let i = 0; i < targets.length; i++) {
        if (targets[i].offsetTop <= scrollY) idx = i;
      }
      links.forEach((l, i) => l.classList.toggle('active', i === idx));
    }
    window.addEventListener('scroll', updateActive, { passive: true });
    updateActive();
  }

  function showFetchError(err) {
    const isFileProtocol = location.protocol === 'file:';
    const msg = String(err && err.message || err);
    const is404 = /HTTP 404/.test(msg);
    const looksLikeDocsRootedServer = docPath.includes('..') && !location.pathname.includes('/docs/');

    let title = 'Could not load document.';
    let bodyHtml = '';

    if (isFileProtocol) {
      title = 'Cannot fetch under file:// — a local HTTP server is needed.';
      bodyHtml = ''
        + '<p>Chromium and Firefox block <code>fetch()</code> for <code>file://</code> URLs.</p>'
        + '<p><b>Fix:</b> run the docs server from the repo root, then open this page over HTTP.</p>'
        + '<pre>' + REPO_ROOT_HINT + '\\scripts\\serve-docs.bat</pre>'
        + '<p>or manually:</p>'
        + '<pre>cd ' + REPO_ROOT_HINT + '\npython -m http.server 8765\n# then browse to  http://127.0.0.1:8765/docs/index.html</pre>'
        + '<p>You can also open the raw markdown:</p>'
        + '<ul>'
        + '  <li><a href="' + escapeAttr(docPath) + '">Open <code>' + escapeHtml(docPath) + '</code> (raw text)</a></li>'
        + '  <li><a href="index.html">← Back to index</a></li>'
        + '</ul>';
    } else if (is404 && looksLikeDocsRootedServer) {
      title = 'HTTP 404 — the server appears to be rooted at docs/, not the repo root.';
      bodyHtml = ''
        + '<p>The path <code>' + escapeHtml(docPath) + '</code> uses <code>..</code> to reach outside <code>docs/</code>, and the server refuses because it is above the served root.</p>'
        + '<p><b>Fix:</b> stop the current server (Ctrl+C) and restart it from the <b>repo root</b>:</p>'
        + '<pre>cd ' + REPO_ROOT_HINT + '\npython -m http.server 8765\n# then browse to  http://127.0.0.1:8765/docs/index.html\n#            NOT  http://127.0.0.1:8765/index.html</pre>'
        + '<ul>'
        + '  <li><a href="' + escapeAttr(docPath) + '">Try the raw file</a> — will 404 too if the server is still docs-rooted.</li>'
        + '  <li><a href="index.html">← Back to index</a></li>'
        + '</ul>';
    } else {
      bodyHtml = ''
        + '<p>' + escapeHtml(msg) + '</p>'
        + '<ul>'
        + '  <li><a href="' + escapeAttr(docPath) + '">Open the raw file</a></li>'
        + '  <li><a href="index.html">← Back to index</a></li>'
        + '</ul>';
    }
    showError(title, bodyHtml);
  }

  function showError(title, bodyHtml, rawFallback) {
    const container = document.getElementById('content');
    let extra = '';
    if (rawFallback) {
      extra = '<h3 style="color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:0.5px">Raw markdown</h3><pre class="raw-fallback">' + escapeHtml(rawFallback) + '</pre>';
    }
    container.innerHTML = '<div class="error-card"><h2>' + escapeHtml(title) + '</h2>' + bodyHtml + '</div>' + extra;
    document.getElementById('doc-title').textContent = title;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
})();
</script>

</body>
</html>
