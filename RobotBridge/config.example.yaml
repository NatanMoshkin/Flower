# Flower robot TCP <-> PLC ADS bridge configuration.
#
# Copy this file to `config.yaml` and edit the placeholder values.
# `config.yaml` is gitignored so real endpoints stay out of version control.

plc:
  # AMS Net ID of the TwinCAT runtime. Use 127.0.0.1.1.1 when the bridge
  # runs on the same machine as TwinCAT; for a remote machine, first add
  # a route in the TwinCAT AMS Router and use that machine's AMS Net ID.
  ams_net_id: "127.0.0.1.1.1"

  # PLC1 uses AMS port 851 by default.
  ams_port: 851

  # Root symbol path of the ST_HmiRobot instance the bridge writes into.
  symbol_prefix: "GVL_Robot.stRobot"

robot:
  # "server" = the bridge listens on `port`, robot dials in.
  # "client" = the bridge dials `host`:`port` on the robot.
  # Decided: robot is the TCP server, so the bridge is the client.
  role: "client"

  # Robot's TCP endpoint. `host` is ignored when role = "server".
  host: "192.168.201.1"
  port: 6001

  # Character encoding used by the robot's ASCII frames.
  encoding: "ascii"

  # Seconds the socket blocks on recv/connect/send before raising. Matches
  # the reference client (`RobotBridge/Client_working_example/tcp client.py`).
  socket_timeout: 2

  # Optional idle-probe: after `heartbeat_idle_seconds` with no data from
  # the robot, send `heartbeat_payload` bytes. Purpose is only to catch a
  # half-open TCP connection quickly; we do not wait for a specific reply.
  # Set heartbeat_idle_seconds: 0 to disable.
  heartbeat_idle_seconds: 5
  heartbeat_payload: "HEARTBEAT"

reconnect:
  # Seconds to wait after a disconnect or error before reconnecting.
  delay_seconds: 2

logger:
  # Directory where daily CSVs are written. Relative paths resolve from
  # the bridge's working directory (usually RobotBridge/).
  dir: "./logs"

  # Retention caps — files are deleted when either is exceeded. Retention
  # runs once at startup and once per hour after that.
  retention_days: 30
  retention_mb: 500

  # Minimum severity written to the CSV. One of DEBUG / INFO / WARNING /
  # ERROR. Runtime override for DEBUG events is available via the HMI
  # (GVL_Log.bDebugMode) so operators can toggle without a restart.
  level: "INFO"

  # How often the log_pump polls GVL_Log.nWriteIdx on the PLC. Lower =
  # tighter latency; higher = fewer ADS reads. 500 ms is a good default.
  # The PLC ring holds 256 entries, so if the PLC produces more than
  # that between polls, oldest events are lost (a warning is logged).
  plc_ring_poll_ms: 500
